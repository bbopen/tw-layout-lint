name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist."
        required: true
        type: string

permissions:
  contents: write
  id-token: write   # required for npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Consumer release-gate
        run: bash scripts/check-consumer.sh

      - name: Pack
        run: npm pack

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${{ inputs.tag || github.ref_name }}"
          EXPECTED="v${PKG_VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag $TAG does not match package version $EXPECTED"
            exit 1
          fi

      - name: Publish to npm (if NPM_TOKEN is configured)
        if: env.NPM_TOKEN != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Skip npm publish (no token)
        if: env.NPM_TOKEN == ''
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "::warning::NPM_TOKEN secret not set; skipping npm publish."
          echo "Set the NPM_TOKEN repository secret to enable automatic publishing."

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          # Skip if release already exists (e.g. created manually)
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading tarball as asset."
          else
            gh release create "$TAG" \
              --title "tw-layout-lint $TAG" \
              --verify-tag \
              --generate-notes
          fi
          gh release upload "$TAG" tw-layout-lint-*.tgz --clobber
